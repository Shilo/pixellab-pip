name: Release New Version
run-name: ${{ inputs.version && format('Release Version {0}', inputs.version) || 'Release New Version (auto-bump)' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to release, e.g. 1.6.0. Leave blank to auto-bump the minor version."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write # sign the build-provenance attestation via Sigstore
  attestations: write

jobs:
  release:
    name: Bump version and release skill
    runs-on: ubuntu-latest
    env:
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }} # optional; VirusTotal steps skip when unset
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }} # optional; ClawHub publish skips when unset

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        shell: bash
        run: python -m pip install -r requirements-dev.txt

      - name: Ensure branch dispatch
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "This workflow must be run from a branch."
            exit 1
          fi

      - name: Run QA checks
        shell: bash
        run: python dev-tools/qa.py

      - name: Run skill security scan
        shell: bash
        # Same pinned SkillSpector as security-scan.yml; blocks the release if the risk score exceeds its threshold.
        run: |
          python -m pip install "skillspector @ git+https://github.com/NVIDIA/skillspector.git@dde36f258729b5aec7c835295a9556e64a2def0c"
          skillspector scan skills/pixellab-pip --no-llm

      - name: Find previous tag
        id: previous_tag
        shell: bash
        run: |
          previous_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || true)"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Bump JSON versions
        id: bump
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const root = process.cwd();
          const skillName = "pixellab-pip";
          const skillDir = path.join(root, "skills", skillName);
          const manifests = [
            { file: ".agents/plugins/marketplace.json", versionPaths: [["plugins", 0, "version"]] },
            { file: ".claude-plugin/marketplace.json", versionPaths: [["plugins", 0, "version"]] },
            { file: ".claude-plugin/plugin.json", versionPaths: [["version"]] },
            { file: ".codex-plugin/plugin.json", versionPaths: [["version"]] },
            { file: ".cursor-plugin/marketplace.json", versionPaths: [["plugins", 0, "version"]] },
            { file: ".cursor-plugin/plugin.json", versionPaths: [["version"]] },
            { file: ".github/plugin/marketplace.json", versionPaths: [["plugins", 0, "version"]] },
            { file: "gemini-extension.json", versionPaths: [["version"]] },
            { file: "plugin.json", versionPaths: [["version"]] },
          ];

          if (!fs.existsSync(skillDir) || !fs.statSync(skillDir).isDirectory()) {
            throw new Error(`Expected skill folder at skills/${skillName}`);
          }

          const files = manifests.map((manifest) => {
            const fullPath = path.join(root, manifest.file);
            if (!fs.existsSync(fullPath)) {
              throw new Error(`Expected manifest file at ${manifest.file}`);
            }

            return {
              ...manifest,
              fullPath,
              data: JSON.parse(fs.readFileSync(fullPath, "utf8")),
            };
          });

          function getPath(value, pathParts, file) {
            let current = value;
            for (const part of pathParts) {
              if (current == null || !(part in current)) {
                throw new Error(`Missing version path ${pathParts.join(".")} in ${file}`);
              }
              current = current[part];
            }
            return current;
          }

          function setPath(value, pathParts, newVersion) {
            let current = value;
            for (const part of pathParts.slice(0, -1)) {
              current = current[part];
            }
            current[pathParts[pathParts.length - 1]] = newVersion;
          }

          function bumpVersion(version) {
            if (!/^\d+\.\d+\.\d+$/.test(version)) {
              throw new Error(`Expected version to use MAJOR.MINOR.PATCH format, found: ${version}`);
            }

            const [major, minor] = version.split(".").map(Number);
            if (minor + 1 >= 10) {
              return `${major + 1}.0.0`;
            }

            return `${major}.${minor + 1}.0`;
          }

          const versions = [
            ...new Set(files.flatMap(({ data, file, versionPaths }) =>
              versionPaths.map((versionPath) => getPath(data, versionPath, file))
            )),
          ];

          if (versions.length !== 1) {
            throw new Error(`Expected exactly one current JSON version, found: ${versions.join(", ") || "none"}`);
          }

          const oldVersion = versions[0];
          const inputVersion = (process.env.INPUT_VERSION || "").trim();
          if (inputVersion && !/^\d+\.\d+\.\d+$/.test(inputVersion)) {
            throw new Error(`Requested version must be MAJOR.MINOR.PATCH, found: ${inputVersion}`);
          }
          if (inputVersion && inputVersion === oldVersion) {
            throw new Error(`Requested version ${inputVersion} is already the current version.`);
          }
          const newVersion = inputVersion || bumpVersion(oldVersion);
          const updatedFiles = [];

          for (const item of files) {
            for (const versionPath of item.versionPaths) {
              setPath(item.data, versionPath, newVersion);
            }

            fs.writeFileSync(item.fullPath, `${JSON.stringify(item.data, null, 2)}\n`);
            updatedFiles.push(item.file);
          }

          if (updatedFiles.length === 0) {
            throw new Error("No JSON version fields were updated.");
          }

          fs.mkdirSync(path.join(root, "dist"), { recursive: true });
          fs.writeFileSync(path.join(root, "dist", "updated-files.txt"), `${updatedFiles.join("\n")}\n`);

          const output = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: "a" });
          output.write(`old_version=${oldVersion}\n`);
          output.write(`new_version=${newVersion}\n`);
          output.write(`tag=v${newVersion}\n`);
          output.write(`skill_name=${skillName}\n`);
          output.end();

          console.log(`Bumped ${oldVersion} -> ${newVersion}`);
          console.log(`Updated JSON files: ${updatedFiles.join(", ")}`);
          NODE

      - name: Build skill archive
        shell: bash
        run: |
          mkdir -p dist
          cd skills
          zip -r "../dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip" "${{ steps.bump.outputs.skill_name }}"
          zipinfo -1 "../dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip" | grep -q '^${{ steps.bump.outputs.skill_name }}/SKILL.md$'
          ! zipinfo -1 "../dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip" | grep -q '^skills/'

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t updated_files < dist/updated-files.txt
          git add -- "${updated_files[@]}"
          git commit -m "Release ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push --atomic origin "HEAD:refs/heads/${GITHUB_REF_NAME}" "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes_args=(--generate-notes)
          if [ -n "${{ steps.previous_tag.outputs.previous_tag }}" ]; then
            notes_args+=(--notes-start-tag "${{ steps.previous_tag.outputs.previous_tag }}")
          fi

          gh release create "${{ steps.bump.outputs.tag }}" \
            "dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip" \
            --title "${{ steps.bump.outputs.skill_name }} ${{ steps.bump.outputs.tag }}" \
            "${notes_args[@]}" \
            --verify-tag

      - name: VirusTotal scan release asset
        id: virustotal
        if: env.VIRUSTOTAL_API_KEY != ''
        continue-on-error: true # post-release enhancement; the release already published, so a transient failure must not red the job
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ env.VIRUSTOTAL_API_KEY }}
          files: dist/${{ steps.bump.outputs.skill_name }}-${{ steps.bump.outputs.new_version }}.zip

      - name: Append VirusTotal permalink to release notes
        if: env.VIRUSTOTAL_API_KEY != '' && steps.virustotal.outputs.analysis != ''
        continue-on-error: true # post-release enhancement; the release already published, so a transient failure must not red the job
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # analysis output format: <filename>=<analysis URL>
          url="${{ steps.virustotal.outputs.analysis }}"
          url="${url#*=}"
          gh release view "${{ steps.bump.outputs.tag }}" --json body --jq .body > notes.md
          printf '\n**VirusTotal:** %s\n' "$url" >> notes.md
          gh release edit "${{ steps.bump.outputs.tag }}" --notes-file notes.md

      - name: Publish to ClawHub for its independent security audit
        if: env.CLAWHUB_TOKEN != ''
        continue-on-error: true # post-release enhancement; the release already published, so a transient failure must not red the job
        env:
          CLAWHUB_OWNER: ${{ vars.CLAWHUB_OWNER }} # optional publisher handle; defaults to the token's account
        shell: bash
        # One-time setup: create a ClawHub account, generate an API token, add it as the CLAWHUB_TOKEN repo secret
        # (optionally set a CLAWHUB_OWNER repo variable). Publishing auto-triggers ClawHub's scan/badge; the skill
        # folder stays agent-agnostic — no OpenClaw-specific files are added to it.
        run: |
          npx --yes clawhub@latest --no-input login --token "$CLAWHUB_TOKEN"
          owner_args=()
          if [ -n "$CLAWHUB_OWNER" ]; then owner_args=(--owner "$CLAWHUB_OWNER"); fi
          npx --yes clawhub@latest --no-input skill publish "skills/${{ steps.bump.outputs.skill_name }}" \
            --slug "${{ steps.bump.outputs.skill_name }}" \
            --name "PixelLab Pip" \
            --version "${{ steps.bump.outputs.new_version }}" \
            --changelog "Release ${{ steps.bump.outputs.tag }}" \
            --tags latest \
            --topics "pixellab,pixellab-pip,pixel-art,pixel-art-generator,game-assets,game-development,ai-agents,agent-skills,agent-plugin,codex-plugin,claude-code,cursor-plugin,github-copilot,gemini-cli,mcp,rest-api,sprites,pixelorama,aseprite,tilesets,api" \
            --source-repo "${{ github.repository }}" \
            --source-commit "$(git rev-parse HEAD)" \
            --source-ref "${{ steps.bump.outputs.tag }}" \
            --source-path "skills/${{ steps.bump.outputs.skill_name }}" \
            "${owner_args[@]}"
