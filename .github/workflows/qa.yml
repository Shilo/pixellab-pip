name: Quality Assurance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    name: Repository QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        shell: bash
        run: python -m pip install -r requirements-dev.txt

      - name: Run QA checks
        shell: bash
        run: python dev-tools/qa.py
