name: Skill Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "20 5 * * 1" # weekly re-audit so the published result never goes stale
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skillspector:
    name: SkillSpector skill audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # publish SARIF to the public Code Scanning tab

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install SkillSpector (pinned)
        shell: bash
        # v2.3.9; not on PyPI and untagged upstream, so pin the audited commit and bump deliberately.
        run: python -m pip install "skillspector @ git+https://github.com/NVIDIA/skillspector.git@dde36f258729b5aec7c835295a9556e64a2def0c"

      - name: Scan skill (static analysis)
        id: scan
        continue-on-error: true # still upload SARIF before failing the job on a high risk score
        shell: bash
        run: skillspector scan skills/pixellab-pip --no-llm --format sarif --output skillspector.sarif

      - name: Upload SARIF to Code Scanning
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
          category: skillspector

      - name: Fail when SkillSpector risk score exceeds its threshold
        if: steps.scan.outcome == 'failure'
        shell: bash
        run: |
          echo "SkillSpector exited nonzero (risk score above its failure threshold, or scan error)."
          exit 1
