name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write # publish results to the OpenSSF API so the score/viewer stays current

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Repo-hygiene score for maintainers (linked from docs/developer.md, not the README).
      # SARIF is intentionally NOT uploaded to the Code Scanning tab: Scorecard's supply-chain
      # checks (Code-Review, Maintained, Fuzzing...) don't fit a solo Markdown skill and would
      # bury the skill-specific SkillSpector findings users actually care about.
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
